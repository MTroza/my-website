<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
</head>

<body>

<h2>Create Account</h2>

<input type="text" id="newUser" placeholder="Username"><br><br>

<input type="password" id="newPass" placeholder="Password"><br><br>

<button onclick="register()">Create Account</button>

<p id="msg"></p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxj-grklficM1_uUzUgfds_26WuawLURx69uquAUQrt-Le5ZpjeNBfd3hl6HWw7Gui-KQ/exec";

function register(){

  const user = document.getElementById("newUser").value.trim();
  const pass = document.getElementById("newPass").value.trim();

  document.getElementById("msg").innerText = "";

  if(user === "" || pass === ""){
    document.getElementById("msg").innerText = "Please fill all fields";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "register",
      username: user,
      password: pass
    })
  })
  .then(res => res.json())
  .then(data => {

    if(data.status === "success"){
      document.getElementById("msg").innerText = "Account created! Redirecting...";
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);

    } 
    else if(data.status === "exists"){
      document.getElementById("msg").innerText = "User already exists";
    }

  })
  .catch(()=>{
    document.getElementById("msg").innerText = "Connection error";
  });

}

</script>

<br><br>
<a href="index.html">Back to Login</a>

</body>
</html>
