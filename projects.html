<!DOCTYPE html>
<html>
<head>
<title>DocHub Projects</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family: Arial, sans-serif;}
body{background:url("bg.jpg") no-repeat center center/cover;height:100vh;}
.topbar{display:flex;justify-content:flex-end;align-items:center;background:black;padding:10px 20px;gap:20px;}
.menu a{color:white;text-decoration:none;margin:0 10px;font-size:15px;}
.menu a:hover{text-decoration:underline;}
.menu a.active{font-weight:bold;}
.logout{background:#ddd;border:none;padding:6px 12px;cursor:pointer;}
.header{display:flex;align-items:center;gap:15px;padding:30px 40px;color:white;}
.logo{width:50px;height:50px;border:2px solid #0d3c6e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.header h1{font-size:42px;}
.header span{display:block;font-size:22px;}
.container{display:flex;gap:25px;padding:20px 40px;}
.add-project{width:260px;height:420px;background:#1e88e5;color:white;padding:20px;border-radius:5px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:0.3s, box-shadow 0.3s;}
.add-project:hover{background:#1565c0;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.projects{flex:1;display:grid;grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));gap:20px;}
.card{height:180px;background:#dcdcdc;display:flex;align-items:center;justify-content:center;font-size:24px;color:#0d3c6e;border-radius:8px;cursor:pointer;transition:0.3s, box-shadow 0.3s, transform 0.3s;opacity:0;transform:translateY(20px);text-align:center;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.card.visible{opacity:1;transform:translateY(0);}
.card:hover{transform:scale(1.05);box-shadow:0 6px 15px rgba(0,0,0,0.25);}
</style>
</head>
<body>

<!-- TOP MENU -->
<div class="topbar">
  <div class="menu">
    <a href="dashboard.html">Home</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="repository.html">Repository</a>
    <a href="photos.html">Photos</a>
    <a href="directory.html">Directory</a>
    <a href="notes.html">Notes</a>
    <a href="links.html">Links</a>
    <a href="contact.html">Contact</a>
  </div>
  <button class="logout" onclick="logout()">Exit</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">⮟</div>
  <div>
    <h1>DocHub</h1>
    <span>Projects</span>
  </div>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="add-project" onclick="addProject()">
    <h2>Add Project +</h2>
    <div style="align-self:flex-end;font-size:30px;">→</div>
  </div>
  <div class="projects" id="projectContainer"></div>
</div>

<script>
// ✅ Google Apps Script Web App URL
const API_URL = "https://script.google.com/macros/s/AKfycbwP7zLQoFsbYzfvW22j4sXs8lcDrgkd2NHC2-6kWItyW4BiIwnANdGpMWMA2pNDknD7/exec";

// Fade-in animation helper
function fadeIn(el){
  requestAnimationFrame(() => el.classList.add('visible'));
}

// Load projects
async function loadProjects(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();
    const container = document.getElementById("projectContainer");
    container.innerHTML = "";
    data.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = p.name;
      div.dataset.id = p.id;
      div.ondblclick = () => renameProject(div);
      container.appendChild(div);
      fadeIn(div);
    });
  }catch(err){
    console.error(err);
    alert("Error loading projects: " + err.message);
  }
}

// Add new project
async function addProject(){
  const name = prompt("Enter project name:");
  if(!name || !name.trim()) return;

  const container = document.getElementById("projectContainer");
  const tempCard = document.createElement("div");
  tempCard.className = "card";
  tempCard.innerText = name;
  container.appendChild(tempCard);
  fadeIn(tempCard);

  try{
    const res = await fetch(API_URL, {
      method:"POST",
      body: JSON.stringify({ action:"add", name })
    });
    const result = await res.json();
    if(result.success){
      loadProjects();
    }else{
      alert("Failed to add project: " + (result.error || "Unknown error"));
      container.removeChild(tempCard);
    }
  }catch(err){
    console.error(err);
    alert("Error adding project: " + err.message);
    container.removeChild(tempCard);
  }
}

// Rename project
async function renameProject(card){
  const newName = prompt("Rename project:", card.innerText);
  if(!newName || !newName.trim()) return;
  try{
    const res = await fetch(API_URL, {
      method:"POST",
      body: JSON.stringify({ action:"rename", id: card.dataset.id, name: newName })
    });
    const result = await res.json();
    if(result.success){
      loadProjects();
    }else{
      alert("Failed to rename project: " + (result.error || "Unknown error"));
    }
  }catch(err){
    console.error(err);
    alert("Error renaming project: " + err.message);
  }
}

// 🔓 Fixed logout
function logout(){
  // Clear session/local storage for login
  localStorage.removeItem("loggedInUser");
  sessionStorage.removeItem("loggedInUser");

  // Redirect to login page
  window.location.href = "index.html";
}

// Auto-load projects on page open
window.onload = loadProjects;
</script>

</body>
</html>
