<!DOCTYPE html>
<html>
<head>
<title>DocHub Projects</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
}

/* BODY */
body{
  display:flex;
  background:url("bg.jpg") no-repeat center center/cover;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#154c6a;
  color:white;
  padding-top:20px;
  height:100vh;
}

.sidebar a{
  display:block;
  padding:15px 20px;
  color:white;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.sidebar a:hover{
  background:#1e88e5;
}

.sidebar a.active{
  background:#0d3c6e;
}

/* MAIN CONTENT */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:flex-end;
  padding:10px 20px;
}

.logout{
  background:#ddd;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:20px 40px;
  color:white;
}

.logo{
  width:50px;
  height:50px;
  border:2px solid #0d3c6e;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.header h1{
  font-size:40px;
}

.header span{
  display:block;
  font-size:20px;
}

/* CONTENT */
.container{
  display:flex;
  gap:25px;
  padding:20px 40px;
}

/* ADD PROJECT */
.add-project{
  width:260px;
  height:420px;
  background:#1e88e5;
  color:white;
  padding:20px;
  border-radius:5px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

.add-project:hover{
  background:#1565c0;
}

/* GRID */
.projects{
  flex:1;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
}

/* CARDS */
.card{
  height:180px;
  background:#dcdcdc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:#0d3c6e;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

.card.dark{
  background:#0d3c6e;
  color:white;
}

.card:hover{
  transform:scale(1.05);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="dashboard.html">🏠 Dashboard</a>
  <a href="projects.html" class="active">📁 Projects</a>
  <a href="repository.html">📂 Repository</a>
  <a href="photos.html">📷 Photos</a>
  <a href="directory.html">👥 Directory</a>
  <a href="notes.html">📝 Notes</a>
  <a href="links.html">🔗 Links</a>
  <a href="contact.html">📞 Contact</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOP RIGHT LOGOUT -->
  <div class="topbar">
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">⮟</div>
    <div>
      <h1>DocHub</h1>
      <span>Projects</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="container">

    <!-- ADD PROJECT -->
    <div class="add-project" onclick="addProject()">
      <h2>Add Project +</h2>
      <div style="align-self:flex-end;font-size:30px;">→</div>
    </div>

    <!-- PROJECT GRID -->
    <div class="projects" id="projectContainer">

      <div class="card" ondblclick="renameProject(this)">Project 1</div>
      <div class="card">Project 2</div>
      <div class="card">Project 3</div>

      <div class="card dark">Project 4</div>
      <div class="card dark">Project 5</div>
      <div class="card dark">Project 6</div>

    </div>

  </div>

</div>

<script>

// ADD PROJECT
function addProject(){
  let name = prompt("Enter project name:");
  if(name){
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = name;
    div.ondblclick = function(){ renameProject(this); };

    document.getElementById("projectContainer").appendChild(div);
  }
}

// RENAME
function renameProject(card){
  let newName = prompt("Rename project:", card.innerText);
  if(newName){
    card.innerText = newName;
  }
}

// LOGOUT
function logout(){
  alert("Logging out...");
  window.location.href = "index.html";
}

</script>

</body>
</html>
