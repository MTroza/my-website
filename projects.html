<!DOCTYPE html>
<html>
<head>
<title>DocHub Projects</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
}

/* BACKGROUND */
body{
  background:url("bg.jpg") no-repeat center center/cover;
  height:100vh;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  background:black;
  padding:10px 20px;
  gap:20px;
}

/* MENU */
.menu a{
  color:white;
  text-decoration:none;
  margin:0 10px;
  font-size:15px;
}

.menu a:hover{
  text-decoration:underline;
}

.menu a.active{
  font-weight:bold;
}

/* LOGOUT */
.logout{
  background:#ddd;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:30px 40px;
  color:white;
}

.logo{
  width:50px;
  height:50px;
  border:2px solid #0d3c6e;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.header h1{
  font-size:42px;
}

.header span{
  display:block;
  font-size:22px;
}

/* MAIN */
.container{
  display:flex;
  gap:25px;
  padding:20px 40px;
}

/* ADD PROJECT PANEL */
.add-project{
  width:260px;
  height:420px;
  background:#1e88e5;
  color:white;
  padding:20px;
  border-radius:5px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

.add-project:hover{
  background:#1565c0;
}

/* GRID */
.projects{
  flex:1;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
}

/* CARDS */
.card{
  height:190px;
  background:#dcdcdc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  color:#0d3c6e;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
  text-align:center;
  padding:10px;
}

.card.dark{
  background:#0d3c6e;
  color:white;
}

.card:hover{
  transform:scale(1.05);
}
</style>

</head>

<body>

<!-- TOP MENU + LOGOUT -->
<div class="topbar">

  <div class="menu">
    <a href="dashboard.html">Home</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="repository.html">Repository</a>
    <a href="photos.html">Photos</a>
    <a href="directory.html">Directory</a>
    <a href="notes.html">Notes</a>
    <a href="links.html">Links</a>
    <a href="contact.html">Contact</a>
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">⮟</div>
  <div>
    <h1>DocHub</h1>
    <span>Projects</span>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- ADD PROJECT -->
  <div class="add-project" onclick="addProject()">
    <h2>Add Project +</h2>
    <div style="align-self:flex-end;font-size:30px;">→</div>
  </div>

  <!-- PROJECT GRID -->
  <div class="projects" id="projectContainer">

    <div class="card" ondblclick="renameProject(this)">Project 1</div>
    <div class="card" ondblclick="renameProject(this)">Project 2</div>
    <div class="card" ondblclick="renameProject(this)">Project 3</div>

    <div class="card dark" ondblclick="renameProject(this)">Project 4</div>
    <div class="card dark" ondblclick="renameProject(this)">Project 5</div>
    <div class="card dark" ondblclick="renameProject(this)">Project 6</div>

  </div>

</div>

<script>

// LOGOUT → redirect to login page
function logout(){
  window.location.href = "index.html";
}

// ADD PROJECT
function addProject(){
  let name = prompt("Enter project name:");
  if(name && name.trim() !== ""){
    let container = document.getElementById("projectContainer");

    let newCard = document.createElement("div");
    newCard.className = "card";
    newCard.innerText = name;

    newCard.ondblclick = function(){
      renameProject(this);
    };

    container.appendChild(newCard);
  }
}

// RENAME PROJECT
function renameProject(card){
  let currentName = card.innerText;
  let newName = prompt("Rename project:", currentName);

  if(newName && newName.trim() !== ""){
    card.innerText = newName;
  }
}

</script>

</body>
</html>
