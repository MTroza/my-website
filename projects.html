<!DOCTYPE html>
<html>
<head>
<title>DocHub Projects</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
}

/* BACKGROUND */
body{
  background:url("bg.jpg") no-repeat center center/cover;
  height:100vh;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  background:black;
  padding:10px 20px;
  gap:20px;
}

/* MENU */
.menu a{
  color:white;
  text-decoration:none;
  margin:0 10px;
  font-size:15px;
}

.menu a:hover{
  text-decoration:underline;
}

.menu a.active{
  font-weight:bold;
}

/* LOGOUT */
.logout{
  background:#ddd;
  border:none;
  padding:6px 12px;
  cursor:pointer;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:30px 40px;
  color:white;
}

.logo{
  width:50px;
  height:50px;
  border:2px solid #0d3c6e;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.header h1{
  font-size:42px;
}

.header span{
  display:block;
  font-size:22px;
}

/* MAIN */
.container{
  display:flex;
  gap:25px;
  padding:20px 40px;
}

/* ADD PROJECT */
.add-project{
  width:260px;
  height:420px;
  background:#1e88e5;
  color:white;
  padding:20px;
  border-radius:5px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  transition:0.3s;
}

.add-project:hover{
  background:#1565c0;
}

/* GRID */
.projects{
  flex:1;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
}

/* CARDS */
.card{
  height:180px;
  background:#dcdcdc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:#0d3c6e;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
  text-align:center;
  padding:10px;
}

.card:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- TOP MENU -->
<div class="topbar">
  <div class="menu">
    <a href="dashboard.html">Home</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="repository.html">Repository</a>
    <a href="photos.html">Photos</a>
    <a href="directory.html">Directory</a>
    <a href="notes.html">Notes</a>
    <a href="links.html">Links</a>
    <a href="contact.html">Contact</a>
  </div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">⮟</div>
  <div>
    <h1>DocHub</h1>
    <span>Projects</span>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- ADD PROJECT -->
  <div class="add-project" onclick="addProject()">
    <h2>Add Project +</h2>
    <div style="align-self:flex-end;font-size:30px;">→</div>
  </div>

  <!-- PROJECT GRID -->
  <div class="projects" id="projectContainer"></div>

</div>

<script>
// ✅ Your Google Apps Script Web App URL
const API_URL = "https://script.google.com/macros/s/AKfycbxyl07lx7-w2bq4f0cN64lZ9AB3Q6SqfE6oe-8oRu3g14QcmMhdL4k_S7GQfc1N7rpT/exec";

// 🔄 LOAD PROJECTS FROM GOOGLE SHEETS
async function loadProjects(){
  try{
    let res = await fetch(API_URL);
    let data = await res.json();

    const container = document.getElementById("projectContainer");
    container.innerHTML = "";

    data.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = p.name;
      div.dataset.id = p.id;

      // double click to rename
      div.ondblclick = function(){
        renameProject(this);
      };

      container.appendChild(div);
    });

  }catch(err){
    alert("Error loading projects. Check your API URL.");
    console.error(err);
  }
}

// ➕ ADD PROJECT (instant UI update)
async function addProject(){
  const name = prompt("Enter project name:");
  if(!name || name.trim() === "") return;

  // 1️⃣ Add locally for instant feedback
  const container = document.getElementById("projectContainer");
  const tempCard = document.createElement("div");
  tempCard.className = "card";
  tempCard.innerText = name;
  tempCard.style.opacity = "0.6"; // visual cue that it's saving
  container.appendChild(tempCard);

  try{
    // 2️⃣ Save to Google Sheets
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "add",
        name: name
      })
    });

    const result = await res.json();

    if(result.success){
      // 3️⃣ Reload to sync IDs and replace temp card
      loadProjects();
    } else {
      alert("Failed to add project.");
      container.removeChild(tempCard); // remove temporary card
    }

  }catch(err){
    alert("Error adding project.");
    console.error(err);
    container.removeChild(tempCard); // remove temporary card
  }
}

// ✏️ RENAME PROJECT
async function renameProject(card){
  const newName = prompt("Rename project:", card.innerText);
  if(!newName || newName.trim() === "") return;

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action:"rename",
        id: card.dataset.id,
        name: newName
      })
    });

    const result = await res.json();

    if(result.success){
      loadProjects(); // reload to update name
    } else {
      alert("Failed to rename project.");
    }
  }catch(err){
    console.error(err);
    alert("Error renaming project.");
  }
}

// 🔓 LOGOUT
function logout(){
  window.location.href = "index.html";
}

// 🚀 AUTO LOAD ON PAGE OPEN
window.onload = loadProjects;
</script>

</body>
</html>
