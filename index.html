<script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// const firebaseConfig = {

};
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let registerMode = false;


window.toggleMode = function(){
  registerMode = !registerMode;

  document.getElementById("error").innerText="";
  document.getElementById("success").innerText="";

  if(registerMode){
    document.getElementById("title").innerText="CREATE ACCOUNT";
    document.getElementById("mainBtn").innerText="REGISTER";
    document.getElementById("switchText").innerText="Already have an account? Login";
  } else {
    document.getElementById("title").innerText="USER LOGIN";
    document.getElementById("mainBtn").innerText="LOG IN";
    document.getElementById("switchText").innerText="No account yet? Create Account";
  }
}


window.login = function(){

  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  document.getElementById("error").innerText="";
  document.getElementById("success").innerText="";

  if(email === "" || password === ""){
    document.getElementById("error").innerText="Please enter email and password";
    return;
  }

  if(registerMode){

   
    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        document.getElementById("success").innerText="Account created!";
        toggleMode();
      })
      .catch(err => {
        document.getElementById("error").innerText=err.message;
      });

  } else {

  
    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        window.location.href="dashboard.html";
      })
      .catch(() => {
        document.getElementById("error").innerText="Invalid login";
      });

  }
}

</script>
