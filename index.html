<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DocHub Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/3.3.2/tailwind.min.css">
</head>
<body class="bg-gradient-to-r from-blue-800 to-blue-900 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-lg shadow-lg w-96">
    <h1 class="text-2xl font-bold mb-6 text-center text-blue-800">DocHub Login</h1>

    <div class="mb-4">
      <input type="text" id="username" placeholder="Username" class="w-full p-2 border rounded"/>
    </div>

    <div class="mb-4">
      <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded"/>
    </div>

    <p id="error" class="text-red-500 mb-4"></p>

    <button onclick="login()" class="w-full bg-blue-800 text-white py-2 rounded hover:bg-blue-900 transition">Login</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
