<!DOCTYPE html>
<html>

<head>
<title>User Login</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0b4c72,#083b5c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:400px;
background:#f1f1f1;
border-radius:8px;
overflow:hidden;
box-shadow:0 12px 35px rgba(0,0,0,0.35);
}

.login-header{
background:#1591c4;
color:white;
text-align:center;
padding:22px;
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.login-body{
padding:40px;
text-align:center;
}

.avatar{
width:90px;
height:90px;
background:#d4d4d4;
border-radius:50%;
margin:auto;
margin-bottom:25px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:#666;
}

.input-box{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #bbb;
border-radius:4px;
font-size:15px;
transition:0.3s;
}

.input-box:focus{
border-color:#1591c4;
outline:none;
box-shadow:0 0 5px rgba(21,145,196,0.5);
}

.options{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:10px;
color:#555;
}

.login-btn{
width:100%;
padding:14px;
margin-top:25px;
background:linear-gradient(90deg,#083b5c,#0b4c72);
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:4px;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.03);
opacity:0.95;
}

.switch{
margin-top:15px;
font-size:14px;
color:#444;
cursor:pointer;
}

#error{
color:red;
margin-top:12px;
font-size:14px;
}

#success{
color:green;
margin-top:12px;
font-size:14px;
}

</style>
</head>

<body>
<body class="login-page">
<div class="login-box">

<div class="login-header" id="title">
USER LOGIN
</div>

<div class="login-body">

<div class="avatar">👤</div>

<input type="text" id="username" class="input-box" placeholder="Username">

<input type="password" id="password" class="input-box" placeholder="Password">

<div class="options">
<label>
<input type="checkbox"> Remember me
</label>
<span style="cursor:pointer;">Forgot Password?</span>
</div>

<button class="login-btn" onclick="login()" id="mainBtn">LOG IN</button>

<p id="error"></p>
<p id="success"></p>

<div class="switch" onclick="toggleMode()" id="switchText">
No account yet? Create Account
</div>

</div>

</div>

<script>

let registerMode = false;

const API_URL = "https://script.google.com/macros/s/AKfycbxj-grklficM1_uUzUgfds_26WuawLURx69uquAUQrt-Le5ZpjeNBfd3hl6HWw7Gui-KQ/exec";

function toggleMode(){
  registerMode = !registerMode;

  document.getElementById("error").innerText="";
  document.getElementById("success").innerText="";
  document.getElementById("error").innerText = "Please wait...";

  if(registerMode){
    document.getElementById("title").innerText="CREATE ACCOUNT";
    document.getElementById("mainBtn").innerText="REGISTER";
    document.getElementById("switchText").innerText="Already have an account? Login";
  } else {
    document.getElementById("title").innerText="USER LOGIN";
    document.getElementById("mainBtn").innerText="LOG IN";
    document.getElementById("switchText").innerText="No account yet? Create Account";
  }
}

function login(){

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  document.getElementById("error").innerText="";
  document.getElementById("success").innerText="";

  if(user === "" || pass === ""){
    document.getElementById("error").innerText="Please enter username and password";
    return;
  }

  if(registerMode){
    // REGISTER
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "register",
        username: user,
        password: pass
      })
    })
    .then(res => res.json())
    .then(data => {

      if(data.status === "success"){
        document.getElementById("success").innerText="Account created! You can now login.";
        toggleMode();
      } 
      else if(data.status === "exists"){
        document.getElementById("error").innerText="User already exists";
      }

    })
    .catch(()=>{
      document.getElementById("error").innerText="Connection error";
    });

  } else {
    // LOGIN
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "login",
        username: user,
        password: pass
      })
    })
    .then(res => res.json())
    .then(data => {

      if(data.status === "success"){

        // MATCHES YOUR DASHBOARD
        localStorage.setItem("user", user);
        localStorage.setItem("role", data.role || "User");

        window.location.href="dashboard.html";

      } else {
        document.getElementById("error").innerText="Invalid Username or Password";
      }

    })
    .catch(()=>{
      document.getElementById("error").innerText="Connection error";
    });
  }
}

</script>

</body>
</html>
