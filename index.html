<div class="login-body">

  <div class="avatar">👤</div>

  <input type="text" id="username" class="input-box" placeholder="Username">
  <input type="password" id="password" class="input-box" placeholder="Password">

  <!-- Options container -->
  <div class="options">
    <label>
      <input type="checkbox"> Remember me
    </label>
    <!-- Forgot password stays inside the box -->
    <span class="forgot" onclick="forgotPassword()">Forgot Password?</span>
  </div>

  <button class="login-btn" onclick="login()" id="mainBtn">LOG IN</button>

  <p id="error"></p>
  <p id="success"></p>

  <div class="switch" onclick="toggleMode()" id="switchText">
    No account yet? Create Account
  </div>

</div>
