<!DOCTYPE html>
<html>

<head>
<title>User Login</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0b4c72,#083b5c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN CARD */

.login-box{
width:400px;
background:#f1f1f1;
border-radius:8px;
overflow:hidden;
box-shadow:0 12px 35px rgba(0,0,0,0.35);
}

/* HEADER */

.login-header{
background:#1591c4;
color:white;
text-align:center;
padding:22px;
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

/* BODY */

.login-body{
padding:40px;
text-align:center;
}

/* USER ICON */

.avatar{
width:90px;
height:90px;
background:#d4d4d4;
border-radius:50%;
margin:auto;
margin-bottom:25px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:#666;
}

/* INPUT */

.input-box{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #bbb;
border-radius:4px;
font-size:15px;
transition:0.3s;
}

.input-box:focus{
border-color:#1591c4;
outline:none;
box-shadow:0 0 5px rgba(21,145,196,0.5);
}

/* OPTIONS */

.options{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:10px;
color:#555;
}

/* LOGIN BUTTON */

.login-btn{
width:100%;
padding:14px;
margin-top:25px;
background:linear-gradient(90deg,#083b5c,#0b4c72);
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:4px;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.03);
opacity:0.95;
}

/* ERROR */

#error{
color:red;
margin-top:12px;
font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

<div class="login-header">
USER LOGIN
</div>

<div class="login-body">

<div class="avatar">👤</div>

<input type="text" id="username" class="input-box" placeholder="Username">

<input type="password" id="password" class="input-box" placeholder="Password">

<div class="options">
<label>
<input type="checkbox"> Remember me
</label>

<span style="cursor:pointer;">Forgot Password?</span>
</div>

<button class="login-btn" onclick="login()">LOG IN</button>

<p id="error"></p>

</div>

</div>

<script>

function login(){

var user = document.getElementById("username").value;
var pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){

localStorage.setItem("loggedIn","true");

window.location.href = "dashboard.html";

}else{

document.getElementById("error").innerText="Invalid Username or Password";

}

}

</script>

</body>
</html>
