<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DocHub Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/3.3.2/tailwind.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white p-4 shadow-md h-screen flex flex-col justify-between">
      <div>
        <h2 class="font-bold text-xl mb-4 text-blue-800">DocHub</h2>
        <ul>
          <li class="mb-2"><a href="#" onclick="showModule('repository')" class="hover:text-blue-600">📂 Documents</a></li>
          <li class="mb-2"><a href="#" onclick="showModule('gallery')" class="hover:text-blue-600">📷 Photo Gallery</a></li>
          <li class="mb-2"><a href="#" onclick="showModule('notes')" class="hover:text-blue-600">📝 Notes</a></li>
          <li class="mb-2"><a href="#" onclick="showModule('directory')" class="hover:text-blue-600">📊 Directory</a></li>
          <li class="mb-2"><a href="#" onclick="showModule('search')" class="hover:text-blue-600">📁 Search</a></li>
        </ul>
      </div>

      <!-- Logout Button -->
      <div>
        <button onclick="logout()" class="w-full bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6" id="mainContent">
      <h1 class="text-2xl font-bold mb-4">Welcome to DocHub Dashboard</h1>
      <p>Select a module from the sidebar to get started.</p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
