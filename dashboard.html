<!DOCTYPE html>
<html>
<head>
  <title>DocHub Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/3.3.2/tailwind.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Sidebar -->
  <div class="flex">
    <aside class="w-64 bg-white p-4 shadow-md">
      <h2 class="font-bold text-xl mb-4">DocHub</h2>
      <ul>
        <li class="mb-2"><a href="#" onclick="showModule('repository')">📂 Documents</a></li>
        <li class="mb-2"><a href="#" onclick="showModule('gallery')">📷 Photo Gallery</a></li>
        <li class="mb-2"><a href="#" onclick="showModule('notes')">📝 Notes</a></li>
        <li class="mb-2"><a href="#" onclick="showModule('directory')">📊 Directory</a></li>
        <li class="mb-2"><a href="#" onclick="showModule('search')">📁 Search</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6" id="mainContent">
      <h1 class="text-2xl font-bold">Welcome to DocHub Dashboard</h1>
      <p>Select a module from the sidebar to get started.</p>
    </main>
  </div>

  <script>
    function showModule(module) {
      const main = document.getElementById('mainContent');
      if(module === 'repository') {
        main.innerHTML = `
          <h2 class="text-xl font-bold mb-4">📂 Document Repository</h2>
          <input type="file" id="fileUpload" multiple class="mb-2 p-2 border rounded"/>
          <button onclick="uploadFiles()" class="bg-blue-500 text-white px-4 py-2 rounded">Upload</button>
          <div id="fileList" class="mt-4"></div>
        `;
      }
      // You can repeat similar blocks for gallery, notes, directory, search
    }

    function uploadFiles() {
      const files = document.getElementById('fileUpload').files;
      const list = document.getElementById('fileList');
      for(let i = 0; i < files.length; i++){
        list.innerHTML += `<p>${files[i].name}</p>`;
        // TODO: Upload file to Google Drive using Apps Script
      }
    }
  </script>

</body>
</html>
