<!DOCTYPE html>
<html>
<head>
  <title>DocHub Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="display:none;" onload="checkLogin()">

<div class="main-container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>DocHub</h2>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="projects.html">📁 Projects</a>
    <a href="repository.html">📂 Repository</a>
    <a href="photos.html">📷 Photos</a>
    <a href="directory.html">👥 Directory</a>
    <a href="notes.html">📝 Notes</a>
    <a href="links.html">🔗 Links</a>
    <a href="contact.html">📞 Contact</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- HEADER -->
    <div class="header">
      <h2 id="welcomeText">Welcome</h2>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- DASHBOARD CARDS -->
    <div class="cards">

      <div class="card blue" onclick="location.href='projects.html'">
        <h3>Projects</h3>
        <p>Manage ongoing projects</p>
      </div>

      <div class="card orange" onclick="location.href='repository.html'">
        <h3>Repository</h3>
        <p>Upload and store documents</p>
      </div>

      <div class="card green" onclick="location.href='photos.html'">
        <h3>Photos</h3>
        <p>View documentation images</p>
      </div>

      <div class="card purple" onclick="location.href='directory.html'">
        <h3>Directory</h3>
        <p>Team information</p>
      </div>

      <div class="card red" onclick="location.href='notes.html'">
        <h3>Notes</h3>
        <p>Write and manage notes</p>
      </div>

      <div class="card dark" onclick="location.href='links.html'">
        <h3>Links</h3>
        <p>Useful resources</p>
      </div>

    </div>

  </div>

</div>

<script>
function checkLogin() {
  const user = localStorage.getItem("user");
  const role = localStorage.getItem("role") || "User";

  if (!user) {
    window.location.href = "index.html";
  } else {
    document.getElementById("welcomeText").innerText =
      "Welcome, " + user + " (" + role + ") 👋";

    document.body.style.display = "block";
  }
}

function logout() {
  localStorage.removeItem("user");
  localStorage.removeItem("role");
  window.location.href = "index.html";
}
</script>

</body>
</html>
