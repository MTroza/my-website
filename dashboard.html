<script>
function checkLogin() {
  const user = localStorage.getItem("user");
  const role = localStorage.getItem("role");

  if (!user) {
    window.location.href = "index.html";
  } else {
    document.getElementById("welcomeText").innerText =
      "Welcome, " + user + " (" + role + ") 👋";
  }
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>
